<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potjie Squad & Budget Planner</title>
    <style>
        /* Modern Minimalist / Bento Box Aesthetics */
        :root {
            --bg-color: #f4f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --accent: #0071e3;
            --danger: #ff3b30;
            --success: #34c759;
            --radius: 24px;
            --meat: #ff6b6b;
            --veg: #51cf66;
            --snacks: #fcc419;
            --drinks: #339af0;
            --supplies: #cc5de8;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
        }

        h2, h3 {
            margin-top: 0;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .header-title {
            text-align: center;
            margin-bottom: 2rem;
        }

        /* Bento Grid Layout */
        .bento-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .bento-card {
            background-color: var(--card-bg);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
        }

        /* Inputs & Form Styles */
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e5e5ea;
            border-radius: 12px;
            background-color: #fafafa;
            font-size: 0.9rem;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
        }

        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--accent);
            background-color: #fff;
        }

        /* Squad Roster Styles */
        .roster-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .total-pool-badge {
            background-color: var(--accent);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            font-weight: bold;
        }

        .member-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .member-row {
            display: grid;
            grid-template-columns: 1.5fr 2fr 1fr;
            gap: 0.75rem;
            align-items: center;
        }

        .member-labels {
            display: grid;
            grid-template-columns: 1.5fr 2fr 1fr;
            gap: 0.75rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #eee;
            margin-bottom: 0.5rem;
        }

        /* Budget Calculator Styles */
        .budget-summary {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
        }

        .warning { color: var(--danger); }
        .good { color: var(--success); }

        .bar-container {
            width: 100%;
            height: 24px;
            background-color: #f5f5f7;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            margin-bottom: 2rem;
        }

        .segment {
            height: 100%;
            transition: width 0.3s ease;
        }
        .seg-meat { background-color: var(--meat); }
        .seg-veg { background-color: var(--veg); }
        .seg-snacks { background-color: var(--snacks); }
        .seg-drinks { background-color: var(--drinks); }
        .seg-supplies { background-color: var(--supplies); }

        .input-group { margin-bottom: 1.25rem; }
        
        .input-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.95rem;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--text-main);
        }

        .legend {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        /* Button Styles */
        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        button {
            flex: 1;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background-color: #0056b3;
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
        }

        .btn-secondary {
            background-color: #f5f5f7;
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background-color: #e5e5ea;
        }

        /* Report Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            overflow-y: auto;
        }

        .modal.show {
            display: block;
        }

        .modal-content {
            background-color: var(--card-bg);
            margin: 2rem auto;
            padding: 2rem;
            border-radius: var(--radius);
            width: 90%;
            max-width: 900px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid #eee;
            padding-bottom: 1rem;
        }

        .modal-header h2 {
            margin: 0;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        .close-btn:hover {
            color: var(--text-main);
        }

        /* Report Sections */
        .report-section {
            margin-bottom: 2rem;
        }

        .report-section h3 {
            color: var(--accent);
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 0.5rem;
        }

        .roster-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .roster-item {
            background-color: #f9f9f9;
            padding: 1rem;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
        }

        .roster-item strong {
            display: block;
            margin-bottom: 0.5rem;
        }

        .roster-item .contribution {
            color: var(--accent);
            font-weight: 600;
        }

        .roster-item .preferences {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .preferences-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        .preference-card {
            background-color: #f9f9f9;
            padding: 1.5rem;
            border-radius: 12px;
            border-top: 4px solid var(--accent);
        }

        .preference-card h4 {
            margin: 0 0 1rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .preference-count {
            background-color: var(--accent);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .preference-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .preference-list li {
            padding: 0.5rem;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
        }

        .preference-list li:last-child {
            border-bottom: none;
        }

        .budget-report {
            background-color: #f9f9f9;
            padding: 1.5rem;
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }

        .budget-item {
            text-align: center;
        }

        .budget-item .category {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .budget-item .amount {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .budget-item.meat .amount { color: var(--meat); }
        .budget-item.veg .amount { color: var(--veg); }
        .budget-item.snacks .amount { color: var(--snacks); }
        .budget-item.drinks .amount { color: var(--drinks); }
        .budget-item.supplies .amount { color: var(--supplies); }

        .print-btn {
            margin-top: 2rem;
            width: 100%;
        }

        @media (max-width: 900px) {
            .bento-grid { grid-template-columns: 1fr; }
            .modal-content { width: 95%; margin: 1rem auto; }
            .button-group { flex-direction: column; }
        }
    </style>
</head>
<body>

    <h2 class="header-title">Potjie Chillas Planner</h2>

    <div class="bento-grid">
        
        <!-- Squad Roster Card -->
        <div class="bento-card">
            <div class="roster-header">
                <h3>Squad Roster</h3>
                <div class="total-pool-badge" id="dynamic-total-display">Pool: R2400</div>
            </div>
            
            <div class="member-labels">
                <span>Name</span>
                <span>Preferences (Drinks/Diet)</span>
                <span>Contribution (R)</span>
            </div>
            
            <div class="member-grid" id="member-container">
                <!-- JavaScript will generate the 12 rows here -->
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="generateReport()">Generate Report</button>
                <button class="btn-secondary" onclick="clearForm()">Clear All</button>
            </div>
        </div>

        <!-- Budget Allocation Card -->
        <div class="bento-card">
            <h3>Budget Allocation</h3>
            
            <div class="budget-summary">
                <span id="capacity-display">Capacity: R2400</span>
                <span id="remaining-text" class="good">Remaining: R0</span>
            </div>

            <!-- Visual Stacked Bar -->
            <div class="bar-container">
                <div id="bar-meat" class="segment seg-meat"></div>
                <div id="bar-veg" class="segment seg-veg"></div>
                <div id="bar-snacks" class="segment seg-snacks"></div>
                <div id="bar-drinks" class="segment seg-drinks"></div>
                <div id="bar-supplies" class="segment seg-supplies"></div>
            </div>

            <!-- Budget Sliders -->
            <div class="input-group">
                <div class="input-header">
                    <span><span class="legend seg-meat"></span>Meat</span>
                    <span id="val-meat">R400</span>
                </div>
                <input type="range" id="input-meat" min="0" max="1500" value="400" step="50">
            </div>

            <div class="input-group">
                <div class="input-header">
                    <span><span class="legend seg-veg"></span>Veg & Starch</span>
                    <span id="val-veg">R250</span>
                </div>
                <input type="range" id="input-veg" min="0" max="800" value="250" step="50">
            </div>

            <div class="input-group">
                <div class="input-header">
                    <span><span class="legend seg-snacks"></span>Snacks</span>
                    <span id="val-snacks">R150</span>
                </div>
                <input type="range" id="input-snacks" min="0" max="800" value="150" step="50">
            </div>

            <div class="input-group">
                <div class="input-header">
                    <span><span class="legend seg-drinks"></span>Drinks</span>
                    <span id="val-drinks">R1250</span>
                </div>
                <input type="range" id="input-drinks" min="0" max="2500" value="1250" step="50">
            </div>

            <div class="input-group">
                <div class="input-header">
                    <span><span class="legend seg-supplies"></span>Supplies (Wood, Ice)</span>
                    <span id="val-supplies">R150</span>
                </div>
                <input type="range" id="input-supplies" min="0" max="800" value="150" step="50">
            </div>
        </div>

    </div>

    <!-- Report Modal -->
    <div id="reportModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Potjie Chillas Report</h2>
                <button class="close-btn" onclick="closeReport()">&times;</button>
            </div>
            <div id="reportContent"></div>
        </div>
    </div>

    <script>
        let maxBudget = 2400;
        const categories = ['meat', 'veg', 'snacks', 'drinks', 'supplies'];
        
        // 1. Generate the 12 Member Rows
        const memberContainer = document.getElementById('member-container');
        for(let i = 1; i <= 12; i++) {
            const row = document.createElement('div');
            row.className = 'member-row';
            row.innerHTML = `
                <input type="text" placeholder="Member ${i}" aria-label="Member Name">
                <input type="text" placeholder="e.g., Savanna, No Pork" aria-label="Preferences">
                <input type="number" class="contrib-input" value="200" min="0" step="50" aria-label="Contribution Amount">
            `;
            memberContainer.appendChild(row);
        }

        // 2. Handle Roster Contribution Updates
        function calculatePool() {
            let sum = 0;
            document.querySelectorAll('.contrib-input').forEach(input => {
                sum += Number(input.value) || 0;
            });
            maxBudget = sum;
            
            // Update displays
            document.getElementById('dynamic-total-display').innerText = `Pool: R${maxBudget}`;
            document.getElementById('capacity-display').innerText = `Capacity: R${maxBudget}`;
            
            // Recalculate visuals with new budget
            updateVisuals();
        }

        // Attach listeners to all contribution inputs
        document.querySelectorAll('.contrib-input').forEach(input => {
            input.addEventListener('input', calculatePool);
        });

        // 3. Handle Budget Allocation Visuals
        function updateVisuals() {
            let totalSpent = 0;

            // Calculate total spent from sliders
            categories.forEach(cat => {
                const val = parseInt(document.getElementById(`input-${cat}`).value) || 0;
                document.getElementById(`val-${cat}`).innerText = `R${val}`;
                totalSpent += val;
            });

            // Update remaining budget status
            const remaining = maxBudget - totalSpent;
            const remainingEl = document.getElementById('remaining-text');
            
            if (remaining < 0) {
                remainingEl.innerText = `Over Budget: -R${Math.abs(remaining)}`;
                remainingEl.className = 'warning';
            } else {
                remainingEl.innerText = `Remaining: R${remaining}`;
                remainingEl.className = 'good';
            }

            // Update the stacked bar widths
            const scaleBase = Math.max(totalSpent, maxBudget);
            const divisor = scaleBase === 0 ? 1 : scaleBase; 
            
            categories.forEach(cat => {
                const val = parseInt(document.getElementById(`input-${cat}`).value) || 0;
                const percentage = (val / divisor) * 100;
                document.getElementById(`bar-${cat}`).style.width = `${percentage}%`;
            });
        }

        // Attach event listeners to all budget sliders
        categories.forEach(cat => {
            document.getElementById(`input-${cat}`).addEventListener('input', updateVisuals);
        });

        // Initialize state on load
        calculatePool();

        // 4. Generate Report Function
        function generateReport() {
            // Collect member data
            const members = [];
            const memberRows = document.querySelectorAll('.member-row');
            memberRows.forEach((row, index) => {
                const inputs = row.querySelectorAll('input');
                const name = inputs[0].value.trim() || `Member ${index + 1}`;
                const preferences = inputs[1].value.trim();
                const contribution = Number(inputs[2].value) || 0;
                
                if (name || preferences || contribution > 0) {
                    members.push({ name, preferences, contribution });
                }
            });

            // Calculate preference summary
            const preferenceMap = {};
            members.forEach(member => {
                if (member.preferences) {
                    const prefs = member.preferences.split(',').map(p => p.trim());
                    prefs.forEach(pref => {
                        if (pref) {
                            preferenceMap[pref] = (preferenceMap[pref] || 0) + 1;
                        }
                    });
                }
            });

            // Get budget allocation
            const budgetData = {};
            categories.forEach(cat => {
                budgetData[cat] = parseInt(document.getElementById(`input-${cat}`).value) || 0;
            });

            // Build report HTML
            let reportHTML = `
                <div class="report-section">
                    <h3>Event Summary</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem;">
                        <div style="background-color: #f9f9f9; padding: 1rem; border-radius: 12px;">
                            <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem;">Total Members</div>
                            <div style="font-size: 1.8rem; font-weight: 600;">${members.length}</div>
                        </div>
                        <div style="background-color: #f9f9f9; padding: 1rem; border-radius: 12px;">
                            <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem;">Total Pool</div>
                            <div style="font-size: 1.8rem; font-weight: 600; color: var(--accent);">R${members.reduce((sum, m) => sum + m.contribution, 0)}</div>
                        </div>
                        <div style="background-color: #f9f9f9; padding: 1rem; border-radius: 12px;">
                            <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem;">Total Budget</div>
                            <div style="font-size: 1.8rem; font-weight: 600; color: var(--accent);">R${Object.values(budgetData).reduce((a, b) => a + b, 0)}</div>
                        </div>
                    </div>
                </div>

                <div class="report-section">
                    <h3>Squad Members & Contributions</h3>
                    <div class="roster-summary">
                        ${members.map(m => `
                            <div class="roster-item">
                                <strong>${m.name}</strong>
                                <div class="contribution">R${m.contribution}</div>
                                ${m.preferences ? `<div class="preferences"><strong>Preferences:</strong> ${m.preferences}</div>` : '<div class="preferences"><em>No preferences</em></div>'}
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="report-section">
                    <h3>Budget Breakdown</h3>
                    <div class="budget-report">
                        <div class="budget-item meat">
                            <div class="category">🥩 Meat</div>
                            <div class="amount">R${budgetData.meat}</div>
                        </div>
                        <div class="budget-item veg">
                            <div class="category">🥬 Veg & Starch</div>
                            <div class="amount">R${budgetData.veg}</div>
                        </div>
                        <div class="budget-item snacks">
                            <div class="category">🍪 Snacks</div>
                            <div class="amount">R${budgetData.snacks}</div>
                        </div>
                        <div class="budget-item drinks">
                            <div class="category">🍹 Drinks</div>
                            <div class="amount">R${budgetData.drinks}</div>
                        </div>
                        <div class="budget-item supplies">
                            <div class="category">🪵 Supplies</div>
                            <div class="amount">R${budgetData.supplies}</div>
                        </div>
                    </div>
                </div>
            `;

            // Add preferences summary if any exist
            if (Object.keys(preferenceMap).length > 0) {
                const sortedPrefs = Object.entries(preferenceMap).sort((a, b) => b[1] - a[1]);
                reportHTML += `
                    <div class="report-section">
                        <h3>Dietary Preferences & Requests Summary</h3>
                        <div class="preferences-summary">
                            ${sortedPrefs.map(([pref, count]) => `
                                <div class="preference-card">
                                    <h4>${pref} <span class="preference-count">${count} ${count === 1 ? 'person' : 'people'}</span></h4>
                                    <ul class="preference-list">
                                        ${members.filter(m => m.preferences && m.preferences.includes(pref)).map(m => `
                                            <li>• ${m.name}</li>
                                        `).join('')}
                                    </ul>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            reportHTML += `
                <button class="btn-primary print-btn" onclick="window.print()">🖨️ Print Report</button>
            `;

            document.getElementById('reportContent').innerHTML = reportHTML;
            document.getElementById('reportModal').classList.add('show');
        }

        function closeReport() {
            document.getElementById('reportModal').classList.remove('show');
        }

        function clearForm() {
            if (confirm('Are you sure you want to clear all data?')) {
                document.querySelectorAll('.member-row input[type="text"], .member-row input[type="number"]').forEach(input => {
                    if (input.classList.contains('contrib-input')) {
                        input.value = '200';
                    } else {
                        input.value = '';
                    }
                });
                calculatePool();
            }
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('reportModal');
            if (event.target === modal) {
                modal.classList.remove('show');
            }
        }
    </script>
</body>
</html>
